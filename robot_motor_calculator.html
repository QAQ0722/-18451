<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機器人馬達角度計算機</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #f5f5f5, #e8eaee);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: #111827;
      color: white;
      padding: 34px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin: 12px 0 0;
      color: #d1d5db;
      line-height: 1.6;
    }

    .content {
      padding: 34px;
    }

    label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    input {
      flex: 1;
      padding: 16px;
      font-size: 22px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      outline: none;
    }

    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.15);
    }

    button {
      padding: 0 22px;
      border: none;
      border-radius: 14px;
      background: #111827;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 24px;
      padding: 28px;
      background: #eef0f4;
      border-radius: 20px;
      text-align: center;
    }

    .result-title {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .degree {
      font-size: 48px;
      font-weight: 900;
      color: #111827;
    }

    .degree span {
      font-size: 24px;
      color: #6b7280;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #6b7280;
    }

    .warning {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7ed;
      color: #92400e;
      border: 1px solid #fed7aa;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .box {
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 18px;
      background: white;
    }

    .box h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .box p {
      margin: 0;
      color: #6b7280;
      line-height: 1.6;
      font-size: 14px;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 5px;
      color: #111827;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      color: #6b7280;
    }

    @media (max-width: 640px) {
      .header,
      .content {
        padding: 24px;
      }

      .header h1 {
        font-size: 25px;
      }

      .input-row {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }

      .degree {
        font-size: 38px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="header">
      <h1>機器人馬達角度計算機</h1>
      <p>
        輸入你想讓車子前進的距離，系統會自動換算成馬達需要旋轉的角度。
        公式是根據你實際測量的資料校正出來的。
      </p>
    </section>

    <section class="content">
      <label for="cmInput">請輸入目標距離，單位：公分</label>

      <div class="input-row">
        <input id="cmInput" type="number" step="0.01" min="0" placeholder="例如：36">
        <button onclick="copyDegrees()">複製角度</button>
      </div>

      <div class="result">
        <div class="result-title">馬達需要旋轉</div>
        <div class="degree" id="degreeOutput">0.00 <span>度</span></div>
        <div class="note" id="copyNote">輸入公分後會自動計算</div>
        <div class="warning" id="warningBox"></div>
      </div>

      <div class="grid">
        <div class="box">
          <h3>使用公式</h3>
          <p>
            距離校正公式：<br>
            <code>公分 = -0.000025 × 角度² + 0.0975 × 角度 + 1</code>
            <br><br>
            反推角度公式：<br>
            <code>角度 = 50 × (39 - √(1537 - 16 × 公分))</code>
          </p>
        </div>

        <div class="box">
          <h3>你的實測資料</h3>
          <table>
            <thead>
              <tr>
                <th>馬達角度</th>
                <th>實際位移</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>100 度</td>
                <td>10.5 公分</td>
              </tr>
              <tr>
                <td>200 度</td>
                <td>19.5 公分</td>
              </tr>
              <tr>
                <td>400 度</td>
                <td>36 公分</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cmInput = document.getElementById("cmInput");
    const degreeOutput = document.getElementById("degreeOutput");
    const warningBox = document.getElementById("warningBox");
    const copyNote = document.getElementById("copyNote");

    let latestDegrees = 0;

    function calculateDegrees(cm) {
      if (cm <= 0) {
        return 0;
      }

      const insideRoot = 1537 - 16 * cm;

      if (insideRoot < 0) {
        return NaN;
      }

      const degrees = 50 * (39 - Math.sqrt(insideRoot));
      return degrees;
    }

    function updateCalculator() {
      const cm = parseFloat(cmInput.value);

      warningBox.style.display = "none";
      warningBox.textContent = "";

      if (Number.isNaN(cm)) {
        latestDegrees = 0;
        degreeOutput.innerHTML = `0.00 <span>度</span>`;
        copyNote.textContent = "輸入公分後會自動計算";
        return;
      }

      const degrees = calculateDegrees(cm);
      latestDegrees = degrees;

      if (Number.isNaN(degrees)) {
        degreeOutput.innerHTML = `無效 <span>數值</span>`;
        copyNote.textContent = "這個距離超出目前公式可計算範圍";
        warningBox.style.display = "block";
        warningBox.textContent = "這個數值太大，目前的校正公式無法計算。建議再測量更遠距離的資料，加入新的校正點。";
        return;
      }

      degreeOutput.innerHTML = `${degrees.toFixed(2)} <span>度</span>`;
      copyNote.textContent = `建議輸入機器人的整數角度：${Math.round(degrees)} 度`;

      if (cm < 10.5 || cm > 36) {
        warningBox.style.display = "block";
        warningBox.textContent = "提醒：這個距離超出你目前實測的 10.5～36 公分範圍，所以結果是估算值。如果要更準，建議多測幾組距離。";
      }
    }

    async function copyDegrees() {
      if (Number.isNaN(latestDegrees)) {
        return;
      }

      const roundedDegrees = Math.round(latestDegrees).toString();

      try {
        await navigator.clipboard.writeText(roundedDegrees);
        copyNote.textContent = `已複製：${roundedDegrees} 度`;
      } catch (error) {
        copyNote.textContent = `複製失敗，請手動輸入：${roundedDegrees} 度`;
      }
    }

    cmInput.addEventListener("input", updateCalculator);
  </script>
</body>
</html>
