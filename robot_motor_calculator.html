<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機器人馬達角度計算機</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #f5f5f5, #e8eaee);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .header {
      background: #111827;
      color: white;
      padding: 34px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin: 12px 0 0;
      color: #d1d5db;
      line-height: 1.6;
    }

    .content {
      padding: 34px;
    }

    label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      outline: none;
    }

    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.15);
    }

    button {
      padding: 0 22px;
      border: none;
      border-radius: 14px;
      background: #111827;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 24px;
      padding: 28px;
      background: #eef0f4;
      border-radius: 20px;
      text-align: center;
    }

    .result-title {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .degree {
      font-size: 48px;
      font-weight: 900;
      color: #111827;
    }

    .degree span {
      font-size: 24px;
      color: #6b7280;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #6b7280;
    }

    .warning {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7ed;
      color: #92400e;
      border: 1px solid #fed7aa;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .box {
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 20px;
      background: white;
    }

    .box h3 {
      margin: 0 0 12px;
      font-size: 19px;
    }

    .box p {
      margin: 0;
      color: #6b7280;
      line-height: 1.6;
      font-size: 14px;
    }

    code {
      display: inline-block;
      background: #f3f4f6;
      padding: 4px 7px;
      border-radius: 6px;
      color: #111827;
      margin-top: 4px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      color: #6b7280;
    }

    .cal-input {
      font-size: 16px;
      padding: 9px 10px;
      border-radius: 10px;
    }

    .mini-buttons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .mini-buttons button {
      padding: 10px 14px;
      font-size: 14px;
    }

    .formula-text {
      word-break: break-word;
    }

    /* 細版滑鼠尾翼 */
    .mouse-trail {
      position: fixed;
      left: 0;
      top: 0;
      width: 26px;
      height: 3px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 9999;
      background: linear-gradient(
        90deg,
        rgba(17, 24, 39, 0.45),
        rgba(17, 24, 39, 0.18),
        transparent
      );
      transform: translate(-50%, -50%) rotate(var(--angle)) scale(1);
      animation: trailFade 0.45s ease-out forwards;
      filter: blur(0.2px);
    }

    .mouse-dot {
      position: fixed;
      left: 0;
      top: 0;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      background: rgba(17, 24, 39, 0.55);
      transform: translate(-50%, -50%);
      animation: dotFade 0.35s ease-out forwards;
    }

    @keyframes trailFade {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) scale(0.2);
      }
    }

    @keyframes dotFade {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
    }

    @media (max-width: 700px) {
      .header,
      .content {
        padding: 24px;
      }

      .header h1 {
        font-size: 25px;
      }

      .input-row {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }

      .degree {
        font-size: 38px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="header">
      <h1>機器人馬達角度計算機</h1>
      <p>
        輸入車子要前進的公分數，系統會自動換算馬達需要旋轉幾度。
        下方實測資料可以自己修改，修改後公式會自動更新。
      </p>
    </section>

    <section class="content">
      <label for="cmInput">請輸入目標距離，單位：公分</label>

      <div class="input-row">
        <input id="cmInput" type="number" step="0.01" min="0" placeholder="例如：36">
        <button onclick="copyDegrees()">複製角度</button>
      </div>

      <div class="result">
        <div class="result-title">馬達需要旋轉</div>
        <div class="degree" id="degreeOutput">0.00 <span>度</span></div>
        <div class="note" id="copyNote">輸入公分後會自動計算</div>
        <div class="warning" id="warningBox"></div>
      </div>

      <div class="grid">
        <div class="box">
          <h3>你的實測資料</h3>
          <table>
            <thead>
              <tr>
                <th>馬達角度</th>
                <th>實際位移</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><input class="cal-input angle-input" type="number" step="0.01" value="100"></td>
                <td><input class="cal-input cm-input" type="number" step="0.01" value="10.5"></td>
              </tr>
              <tr>
                <td><input class="cal-input angle-input" type="number" step="0.01" value="200"></td>
                <td><input class="cal-input cm-input" type="number" step="0.01" value="19.5"></td>
              </tr>
              <tr>
                <td><input class="cal-input angle-input" type="number" step="0.01" value="400"></td>
                <td><input class="cal-input cm-input" type="number" step="0.01" value="36"></td>
              </tr>
            </tbody>
          </table>

          <div class="mini-buttons">
            <button onclick="resetCalibration()">恢復預設</button>
            <button onclick="saveCalibration()">儲存資料</button>
          </div>

          <p style="margin-top: 12px;">
            修改任一格後，公式會立刻重新計算。
          </p>
        </div>

        <div class="box">
          <h3>目前公式</h3>
          <p class="formula-text">
            距離校正公式：<br>
            <code id="formulaOutput">公分 = ...</code>
            <br><br>
            換算方式：<br>
            <code>輸入公分 → 自動反推馬達角度</code>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cmInput = document.getElementById("cmInput");
    const degreeOutput = document.getElementById("degreeOutput");
    const warningBox = document.getElementById("warningBox");
    const copyNote = document.getElementById("copyNote");
    const formulaOutput = document.getElementById("formulaOutput");

    const angleInputs = document.querySelectorAll(".angle-input");
    const cmInputs = document.querySelectorAll(".cm-input");

    let latestDegrees = 0;
    let coefficientA = -0.000025;
    let coefficientB = 0.0975;
    let coefficientC = 1;

    function getCalibrationPoints() {
      const points = [];

      for (let i = 0; i < 3; i++) {
        const angle = parseFloat(angleInputs[i].value);
        const cm = parseFloat(cmInputs[i].value);

        if (Number.isNaN(angle) || Number.isNaN(cm)) {
          return null;
        }

        points.push({
          angle: angle,
          cm: cm
        });
      }

      return points;
    }

    function calculateQuadraticFormula() {
      const points = getCalibrationPoints();

      if (points === null) {
        formulaOutput.textContent = "資料不完整，請確認每格都有數字";
        return false;
      }

      const x1 = points[0].angle;
      const y1 = points[0].cm;
      const x2 = points[1].angle;
      const y2 = points[1].cm;
      const x3 = points[2].angle;
      const y3 = points[2].cm;

      if (x1 === x2 || x1 === x3 || x2 === x3) {
        formulaOutput.textContent = "三組馬達角度不能一樣";
        return false;
      }

      const denominator = (x1 - x2) * (x1 - x3) * (x2 - x3);

      coefficientA = (
        x3 * (y2 - y1) +
        x2 * (y1 - y3) +
        x1 * (y3 - y2)
      ) / denominator;

      coefficientB = (
        x3 * x3 * (y1 - y2) +
        x2 * x2 * (y3 - y1) +
        x1 * x1 * (y2 - y3)
      ) / denominator;

      coefficientC = (
        x2 * x3 * (x2 - x3) * y1 +
        x3 * x1 * (x3 - x1) * y2 +
        x1 * x2 * (x1 - x2) * y3
      ) / denominator;

      formulaOutput.textContent =
        "公分 = " +
        coefficientA.toFixed(8) +
        " × 角度² + " +
        coefficientB.toFixed(8) +
        " × 角度 + " +
        coefficientC.toFixed(8);

      return true;
    }

    function calculateDegrees(targetCm) {
      if (targetCm <= 0) {
        return 0;
      }

      const success = calculateQuadraticFormula();

      if (!success) {
        return NaN;
      }

      const a = coefficientA;
      const b = coefficientB;
      const c = coefficientC - targetCm;

      if (Math.abs(a) < 0.000000001) {
        if (Math.abs(b) < 0.000000001) {
          return NaN;
        }

        return -c / b;
      }

      const discriminant = b * b - 4 * a * c;

      if (discriminant < 0) {
        return NaN;
      }

      const root1 = (-b + Math.sqrt(discriminant)) / (2 * a);
      const root2 = (-b - Math.sqrt(discriminant)) / (2 * a);

      const points = getCalibrationPoints();
      const angles = points.map(p => p.angle);
      const minAngle = Math.min(...angles);
      const maxAngle = Math.max(...angles);

      const candidates = [root1, root2].filter(value => value >= 0 && Number.isFinite(value));

      if (candidates.length === 0) {
        return NaN;
      }

      const insideCandidates = candidates.filter(value => value >= minAngle && value <= maxAngle);

      if (insideCandidates.length > 0) {
        return insideCandidates[0];
      }

      let best = candidates[0];
      let bestDistance = Infinity;

      for (const value of candidates) {
        let distance;

        if (value < minAngle) {
          distance = minAngle - value;
        } else if (value > maxAngle) {
          distance = value - maxAngle;
        } else {
          distance = 0;
        }

        if (distance < bestDistance) {
          bestDistance = distance;
          best = value;
        }
      }

      return best;
    }

    function updateCalculator() {
      const targetCm = parseFloat(cmInput.value);

      warningBox.style.display = "none";
      warningBox.textContent = "";

      calculateQuadraticFormula();

      if (Number.isNaN(targetCm)) {
        latestDegrees = 0;
        degreeOutput.innerHTML = `0.00 <span>度</span>`;
        copyNote.textContent = "輸入公分後會自動計算";
        return;
      }

      const degrees = calculateDegrees(targetCm);
      latestDegrees = degrees;

      if (Number.isNaN(degrees)) {
        degreeOutput.innerHTML = `無效 <span>數值</span>`;
        copyNote.textContent = "目前資料無法換算這個距離";
        warningBox.style.display = "block";
        warningBox.textContent = "請確認三組實測資料都正確，而且馬達角度不要重複。";
        return;
      }

      degreeOutput.innerHTML = `${degrees.toFixed(2)} <span>度</span>`;
      copyNote.textContent = `建議輸入機器人的整數角度：${Math.round(degrees)} 度`;

      const points = getCalibrationPoints();

      if (points !== null) {
        const distances = points.map(p => p.cm);
        const minCm = Math.min(...distances);
        const maxCm = Math.max(...distances);

        if (targetCm < minCm || targetCm > maxCm) {
          warningBox.style.display = "block";
          warningBox.textContent =
            "提醒：這個距離超出你目前實測的 " +
            minCm +
            "～" +
            maxCm +
            " 公分範圍，所以結果是估算值。如果要更準，建議多測幾組距離。";
        }
      }
    }

    async function copyDegrees() {
      if (Number.isNaN(latestDegrees)) {
        return;
      }

      const roundedDegrees = Math.round(latestDegrees).toString();

      try {
        await navigator.clipboard.writeText(roundedDegrees);
        copyNote.textContent = `已複製：${roundedDegrees} 度`;
      } catch (error) {
        copyNote.textContent = `複製失敗，請手動輸入：${roundedDegrees} 度`;
      }
    }

    function saveCalibration() {
      const points = getCalibrationPoints();

      if (points === null) {
        copyNote.textContent = "儲存失敗：請確認每格都有數字";
        return;
      }

      localStorage.setItem("robotCalibrationPoints", JSON.stringify(points));
      copyNote.textContent = "已儲存實測資料";
    }

    function loadCalibration() {
      const saved = localStorage.getItem("robotCalibrationPoints");

      if (!saved) {
        return;
      }

      try {
        const points = JSON.parse(saved);

        for (let i = 0; i < 3; i++) {
          angleInputs[i].value = points[i].angle;
          cmInputs[i].value = points[i].cm;
        }
      } catch (error) {
        localStorage.removeItem("robotCalibrationPoints");
      }
    }

    function resetCalibration() {
      angleInputs[0].value = 100;
      cmInputs[0].value = 10.5;

      angleInputs[1].value = 200;
      cmInputs[1].value = 19.5;

      angleInputs[2].value = 400;
      cmInputs[2].value = 36;

      localStorage.removeItem("robotCalibrationPoints");
      updateCalculator();
      copyNote.textContent = "已恢復預設資料";
    }

    cmInput.addEventListener("input", updateCalculator);

    for (const input of angleInputs) {
      input.addEventListener("input", updateCalculator);
    }

    for (const input of cmInputs) {
      input.addEventListener("input", updateCalculator);
    }

    loadCalibration();
    updateCalculator();

    /* 細版滑鼠尾翼程式 */
    let lastMouseX = null;
    let lastMouseY = null;
    let trailTimer = 0;

    document.addEventListener("mousemove", function(event) {
      const now = Date.now();

      if (now - trailTimer < 12) {
        return;
      }

      trailTimer = now;

      const x = event.clientX;
      const y = event.clientY;

      let angle = 0;

      if (lastMouseX !== null && lastMouseY !== null) {
        const dx = x - lastMouseX;
        const dy = y - lastMouseY;
        angle = Math.atan2(dy, dx) * 180 / Math.PI;
      }

      lastMouseX = x;
      lastMouseY = y;

      const trail = document.createElement("div");
      trail.className = "mouse-trail";
      trail.style.left = x + "px";
      trail.style.top = y + "px";
      trail.style.setProperty("--angle", angle + "deg");

      const dot = document.createElement("div");
      dot.className = "mouse-dot";
      dot.style.left = x + "px";
      dot.style.top = y + "px";

      document.body.appendChild(trail);
      document.body.appendChild(dot);

      setTimeout(function() {
        trail.remove();
        dot.remove();
      }, 500);
    });
  </script>
</body>
</html>
